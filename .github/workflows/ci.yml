name: CI — Lint & Test

on:
  pull_request:
    branches:
      - main
      - develop
      - "release/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "16.3"
  SIMULATOR_DEVICE: "iPhone 16"
  SIMULATOR_OS: "18.4"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 – Static analysis (SwiftLint)
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: ✅ Lint
    runs-on: macos-15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Ruby & Bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run Fastlane lint lane
        run: bundle exec fastlane lint

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 – Build & Unit Tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: ✅ Build & Test
    runs-on: macos-15
    needs: lint           # only run when lint passes

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Ruby & Bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Restore Swift Package Manager cache
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            .build
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Scaffold CI configuration stubs
        run: |
          # Create minimal xcconfig stubs so the build resolves variable references.
          # Real API keys are NOT required for building/testing in CI.
          mkdir -p AudioEffect/AppEnvironment/Configuration
          cp AudioEffect/AppEnvironment/Configuration/dev.xcconfig.example \
             AudioEffect/AppEnvironment/Configuration/dev.xcconfig
          cp AudioEffect/AppEnvironment/Configuration/production.xcconfig.example \
             AudioEffect/AppEnvironment/Configuration/production.xcconfig
          cp AudioEffect/GoogleService-Info.plist.example \
             AudioEffect/GoogleService-Info.plist

      - name: Run Fastlane test lane
        run: bundle exec fastlane test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: fastlane/test_output/
          retention-days: 14
